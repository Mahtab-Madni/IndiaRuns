# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  A multi-signal CPU-only ranking pipeline that treats the JD as an engineering brief, not a keyword list. 

  **Stage 1** loads and validates candidates from JSONL.
  **Stage 2** runs automated honeypot detection using consistency checks (experience/company founding date mismatches, expert skills with 0 months use, YOE vs history mismatches). **Stage 3** extracts ~25 named features across four categories: 
    (a) hard technical requirements from JD (retrieval depth, evaluation depth, LLM integration, Python strength), 
    (b) experience quality (YOE fit, ML career fraction, product-company vs consulting fraction, production deployment evidence), 
    (c) behavioral signals (recency of platform activity, open-to-work flag, recruiter response rate, notice period, interview completion rate), and 
    (d) logistics (location fit, work mode preference, salary expectations). 
  **Stage 4** applies TF-IDF + BM25 semantic scoring over a JD text blob derived from careful JD reading (not just keyword extraction). 
  **Stage 5** computes a weighted composite score with multiplicative penalties for hard disqualifiers (red-flag titles, consulting-only careers, honeypots). 
  **Stage 6** generates grounded, rank-consistent reasoning. Total runtime < 2 minutes on CPU.

  **Key design decisions:**
  - No GPU, no external API calls — fully reproducible on standard hardware
  - Honeypot detection via logical consistency, not special-casing
  - Behavioral signals weighted significantly — an inactive perfect-on-paper candidate is deprioritized
  - Consulting-only and red-flag-title penalties mirror explicit JD exclusions


